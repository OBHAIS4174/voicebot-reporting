version: '3.8'

# Replica MySQL runs on the HOST (not in Docker) on the reporting server (172.16.0.242).
# See replica-init/ for setup scripts.
#
# Optional: start Adminer for read-only query access:
#   docker compose --profile tools up -d

services:
  adminer:
    image: adminer
    container_name: voicebot_reporting_adminer
    profiles:
      - tools
    restart: unless-stopped
    ports:
      - "127.0.0.1:8070:8080"
    environment:
      ADMINER_DEFAULT_SERVER: 172.17.0.1   # host MySQL replica via Docker bridge
